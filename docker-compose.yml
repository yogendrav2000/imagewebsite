version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://localhost:3000
      # API secrets (GFPGAN, CodeFormer, Real-ESRGAN, etc.)
      - REPLICATE_API_TOKEN=your_replicate_token_here
    restart: always
